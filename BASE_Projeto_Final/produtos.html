<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produtos - Real Acessórios</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <div class="direita">
       <img src="/src/Rc.jpg" id="imagem">
      </div>
      <h1>Real Acessórios</h1>
      <nav>
        <ul>
          <li><a href="Index.html">Home</a></li>
          <li><a href="produtos.html">Produtos</a></li>
          <li><a href="pedidos.html">Pedidos</a></li>
          <li><a href="clientes.html">Clientes</a></li>
        </ul>
      </nav>
    </header>
    <h2>Novo Produto</h2>
    <form id="formProduto">
      <label>Nome do Produto:</label>
      <input type="text" id="nome" placeholder="Nome do Produto" required />
      <label>Preço do Produto:</label>
      <input
        type="number"
        id="preco"
        step="0.01"
        placeholder="Preço (Ex: 25.90)"
        required
      />
      <label>Etoque do Produto: </label>
      <input
        type="number"
        id="estoque"
        placeholder="Quantidade em Estoque"
        required
      />
      <button id="btnSalvar" type="submit">Cadastrar Produto</button>
      <button
        type="button"
        id="btnCancelar"
        style="display: none; background-color: red; color: white"
      >
        Cancelar
      </button>
    </form>
    <p id="mensagemProduto"></p>

    <h3>Produtos</h3>
    <table border="1" id="tabelaProdutos">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Preço</th>
          <th>Estoque</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <footer>
      <p>© 2026 Real Acessórios. Todos os direitos reservados.</p>
    </footer>
  </body>
</html>
